<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>阿颜翻译站 · 极简美学</title>
    <!-- 谷歌字体 & Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #f8faff, #eef2fc);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
            position: relative;
        }

        /* 装饰性光晕 */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(224,122,95,0.08) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部区域 - 发光标题 */
        .hero {
            text-align: center;
            margin-bottom: 2.8rem;
            position: relative;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1F3B4C, #2C5A6E, #E07A5F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.05));
        }
        .hero h1 i {
            background: none;
            color: #E07A5F;
            font-size: 2.8rem;
            filter: drop-shadow(0 2px 4px rgba(224,122,95,0.3));
        }
        .hero .sub {
            margin-top: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            color: #5f7c9c;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 80px;
            border: 1px solid rgba(224,122,95,0.2);
        }

        /* 主卡片 - 毛玻璃 + 高级阴影 */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 1.8rem;
            transition: all 0.3s ease;
        }

        /* 双栏灵活布局 */
        .translate-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .panel {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.5rem 1.5rem 1.8rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
        }
        .panel:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .lang-select {
            background: white;
            border: 1px solid #e2edf7;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e2f3e;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            outline: none;
        }
        .lang-select:hover {
            border-color: #E07A5F;
        }
        .swap-icon {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.25s ease;
            color: #E07A5F;
            font-size: 1.2rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .swap-icon:hover {
            background: #E07A5F;
            color: white;
            transform: rotate(180deg) scale(1.02);
            border-color: #E07A5F;
        }

        textarea {
            width: 100%;
            border: 1px solid #e2edf7;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            resize: vertical;
            background: #ffffff;
            transition: 0.2s;
            color: #1f384b;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: #E07A5F;
            box-shadow: 0 0 0 3px rgba(224,122,95,0.15);
        }
        .char-count {
            text-align: right;
            font-size: 0.7rem;
            color: #8ba3bc;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 1.2rem;
        }
        .btn {
            border: none;
            background: #f0f4fa;
            padding: 0.55rem 1.4rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #E07A5F;
            color: white;
            box-shadow: 0 6px 14px rgba(224,122,95,0.3);
        }
        .btn-primary:hover {
            background: #c45d42;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(224,122,95,0.35);
        }
        .btn-secondary:hover {
            background: #e4eaf2;
            transform: translateY(-1px);
        }
        .result-area {
            background: #ffffffd9;
            border-radius: 1.2rem;
            padding: 0rem 0.2rem;
            min-height: 160px;
            display: flex;
            flex-direction: column;
        }
        .translated-text {
            font-size: 1rem;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            color: #1e2f3e;
            font-weight: 500;
            background: #fefefe;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid #ecf3f8;
        }
        .loading-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            color: #E07A5F;
            font-size: 0.8rem;
            margin-top: 12px;
            background: #fef6f2;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            width: fit-content;
        }
        /* 附加小功能 */
        .copy-tooltip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f3b4c;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 999;
        }
        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #7c9ab3;
            background: rgba(255,255,240,0.3);
            backdrop-filter: blur(2px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 1.9rem; }
            .glass-card { padding: 1rem; }
            .panel { padding: 1rem; }
            .btn { padding: 0.45rem 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>
            <i class="fas fa-feather-alt"></i> 
            阿颜翻译站
        </h1>
        <div class="sub">
            <i class="fas fa-robot"></i> 免费无密钥 · 即输即译 · 丝滑体验
        </div>
    </div>

    <div class="glass-card">
        <div class="translate-panel">
            <!-- 左侧：源语言区 -->
            <div class="panel">
                <div class="panel-header">
                    <select id="sourceLang" class="lang-select">
                        <option value="auto">🌐 自动检测</option>
                        <option value="zh" selected>🇨🇳 中文</option>
                        <option value="en">🇺🇸 英文</option>
                        <option value="ja">🇯🇵 日文</option>
                        <option value="ko">🇰🇷 韩文</option>
                        <option value="fr">🇫🇷 法文</option>
                        <option value="de">🇩🇪 德文</option>
                        <option value="es">🇪🇸 西班牙文</option>
                        <option value="ru">🇷🇺 俄文</option>
                        <option value="it">🇮🇹 意大利文</option>
                        <option value="ar">🇸🇦 阿拉伯文</option>
                    </select>
                    <div class="swap-icon" id="swapLangBtn" title="交换语言">
                        <i class="fas fa-arrows-rotate"></i>
                    </div>
                </div>
                <textarea id="sourceText" rows="6" placeholder="请输入要翻译的文字... (支持多语言，自动检测)"></textarea>
                <div class="char-count"><span id="charCount">0</span> 个字符 · <i class="far fa-keyboard"></i> Ctrl+Enter 翻译</div>
                <div class="action-buttons">
                    <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-trash-alt"></i> 清空</button>
                    <button class="btn btn-primary" id="translateBtn"><i class="fas fa-language"></i> 翻译</button>
                </div>
            </div>

            <!-- 右侧：目标语言区 -->
            <div class="panel">
                <div class="panel-header">
                    <select id="targetLang" class="lang-select">
                        <option value="zh">🇨🇳 中文</option>
                        <option value="en" selected>🇺🇸 英文</option>
                        <option value="ja">🇯🇵 日文</option>
                        <option value="ko">🇰🇷 韩文</option>
                        <option value="fr">🇫🇷 法文</option>
                        <option value="de">🇩🇪 德文</option>
                        <option value="es">🇪🇸 西班牙文</option>
                        <option value="ru">🇷🇺 俄文</option>
                        <option value="it">🇮🇹 意大利文</option>
                        <option value="ar">🇸🇦 阿拉伯文</option>
                    </select>
                    <button class="btn btn-secondary" id="copyBtn"><i class="far fa-copy"></i> 复制译文</button>
                </div>
                <div class="result-area">
                    <div class="translated-text" id="translatedText">
                        🌟 等待翻译，输入文本后点击“翻译”即可
                    </div>
                </div>
                <div class="loading-indicator" id="loadingIndicator">
                    <i class="fas fa-circle-notch fa-spin"></i> 正在调用智慧翻译引擎...
                </div>
            </div>
        </div>
    </div>
    <footer>
        <i class="fas fa-globe"></i> 基于 MyMemory 神经翻译 · 无需任何密钥，完全免费 · 每日海量额度
    </footer>
</div>
<div id="copyToast" class="copy-tooltip"><i class="fas fa-check-circle"></i> 译文已复制</div>

<script>
    // --------------------------------------------------------------
    // 美观版翻译站 | 使用 MyMemory 公共API (无需注册/密钥，完全免费)
    // 语言代码映射 (MyMemory 使用标准 ISO 639-1)
    // --------------------------------------------------------------
    const langMap = {
        'auto': 'auto',
        'zh': 'zh',
        'en': 'en',
        'ja': 'ja',
        'ko': 'ko',
        'fr': 'fr',
        'de': 'de',
        'es': 'es',
        'ru': 'ru',
        'it': 'it',
        'ar': 'ar'
    };

    // DOM 元素
    const sourceLangSelect = document.getElementById('sourceLang');
    const targetLangSelect = document.getElementById('targetLang');
    const sourceTextarea = document.getElementById('sourceText');
    const translatedDiv = document.getElementById('translatedText');
    const translateBtn = document.getElementById('translateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const swapBtn = document.getElementById('swapLangBtn');
    const charCountSpan = document.getElementById('charCount');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const copyToast = document.getElementById('copyToast');

    // 更新字符计数
    function updateCharCount() {
        charCountSpan.innerText = sourceTextarea.value.length;
    }
    sourceTextarea.addEventListener('input', updateCharCount);
    updateCharCount();

    // 清空输入
    clearBtn.addEventListener('click', () => {
        sourceTextarea.value = '';
        translatedDiv.innerHTML = '🌟 等待翻译，输入文本后点击“翻译”即可';
        updateCharCount();
    });

    // 显示提示toast
    function showCopyToast() {
        copyToast.style.opacity = '1';
        setTimeout(() => {
            copyToast.style.opacity = '0';
        }, 1800);
    }

    // 复制译文
    copyBtn.addEventListener('click', async () => {
        const textContent = translatedDiv.innerText;
        if (textContent && !textContent.includes('等待翻译') && !textContent.includes('错误')) {
            try {
                await navigator.clipboard.writeText(textContent);
                showCopyToast();
            } catch (err) {
                alert('复制失败，可以手动选择文本');
            }
        } else {
            alert('没有可复制的译文，请先翻译');
        }
    });

    // 交换源语言和目标语言 (自动检测不可交换时提示)
    swapBtn.addEventListener('click', () => {
        let fromVal = sourceLangSelect.value;
        let toVal = targetLangSelect.value;
        if (fromVal === 'auto') {
            alert('自动检测模式下无法交换语言，请先手动选择源语言');
            return;
        }
        sourceLangSelect.value = toVal;
        targetLangSelect.value = fromVal;
        // 如果有输入文本，自动再翻译一下提升交互
        if (sourceTextarea.value.trim()) {
            performTranslation();
        }
    });

    // 核心翻译函数：调用 MyMemory 公开API (无需apikey)
    async function performTranslation() {
        const sourceText = sourceTextarea.value.trim();
        if (!sourceText) {
            translatedDiv.innerHTML = '⚠️ 请在左侧输入需要翻译的文字';
            return;
        }

        let fromLang = sourceLangSelect.value;
        let toLang = targetLangSelect.value;
        if (fromLang === 'auto') fromLang = 'auto';
        
        // 构建MyMemory的langpair: 格式 en|zh
        const langPair = `${langMap[fromLang]}|${langMap[toLang]}`;
        const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sourceText)}&langpair=${langPair}&de=aybqcqs@example.com`;
        
        // 显示加载状态
        loadingIndicator.style.display = 'flex';
        translatedDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 智慧翻译引擎工作中...';
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('网络响应异常');
            const data = await response.json();
            // MyMemory 返回结构: responseData.translatedText
            let translated = data?.responseData?.translatedText || '翻译失败，请稍后重试';
            // 有时候会返回 "EN:xxxx" 或者带有特殊标记, 做清洗
            if (translated.startsWith(fromLang.toUpperCase() + ':') || translated.includes(':::ape:::ape:::')) {
                // 移除一些奇怪前缀
                translated = translated.replace(/^[A-Z]{2}:/, '').replace(/:::ape:::ape:::/g, '');
            }
            // 美化空值
            if (!translated || translated === sourceText) {
                translated = '😥 翻译无结果，可尝试短句或检查语言';
            }
            translatedDiv.innerHTML = translated;
        } catch (err) {
            console.error(err);
            translatedDiv.innerHTML = '❌ 翻译接口调用失败，请检查网络或稍后再试。\n(MyMemory免费服务偶尔限流，重试即可)';
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }

    translateBtn.addEventListener('click', performTranslation);

    // 快捷键 Ctrl+Enter
    sourceTextarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            performTranslation();
        }
    });

    // 可选：自动检测时如果源语言变化，小提示优雅（不需要额外操作）
    // 增加初始化演示样例
    sourceTextarea.placeholder = "例如：你好，世界！\n或者 Hello, world!";
    
    // 为了首屏体验，显示一个可爱的示例文字（不是自动翻译，只是提示）
    translatedDiv.innerHTML = '✨ 输入文字后点击翻译，或按 Ctrl+Enter ✨';
    
    // 添加一个光滑的波纹效果用于按钮 (装饰)
    const btns = document.querySelectorAll('.btn');
    btns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple-eff';
            ripple.style.left = `${e.clientX - rect.left}px`;
            ripple.style.top = `${e.clientY - rect.top}px`;
            btn.style.position = 'relative';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 400);
        });
    });
    // 动态添加涟漪样式
    const rippleStyle = document.createElement('style');
    rippleStyle.textContent = `
        .ripple-eff {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            width: 8px;
            height: 8px;
            transform: scale(0);
            animation: rippleAnim 0.4s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(20);
                opacity: 0;
            }
        }
        .btn { overflow: hidden; }
        textarea, .lang-select, .btn { transition: all 0.2s; }
    `;
    document.head.appendChild(rippleStyle);
</script>
</body>
</html>
